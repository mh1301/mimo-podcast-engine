version: "3.9"

services:
  api:
    build: .
    container_name: mimo-podcast-engine
    ports:
      - "8000:8000"
    environment:
      - MIMO_PODCAST_DEBUG=true
      - MIMO_PODCAST_HOST=0.0.0.0
      - MIMO_PODCAST_PORT=8000
      - MIMO_PODCAST_MIMO_API_BASE=http://mimo-llm:8080/v1
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mimo-llm:
    image: nousresearch/mimo:latest
    container_name: mimo-llm
    ports:
      - "8080:8080"
    environment:
      - MODEL_NAME=MiMo-7B-RL
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
